---
- name: Ensure ansible_facts used by role
  setup:
    gather_subset: "{{ __pam_pwd_required_facts_subsets }}"
  when: __pam_pwd_required_facts |
    difference(ansible_facts.keys() | list) | length > 0
  vars:
    # ansible_facts required by the role
    __pam_pwd_required_facts:
      - distribution
      - distribution_major_version
      - distribution_version
      - os_family

    # the subsets of ansible_facts that need to be gathered in case any of the
    # facts in required_facts is missing; see the documentation of
    # the 'gather_subset' parameter of the 'setup' module
    __pam_pwd_required_facts_subsets: "{{ ['!all', '!min'] +
      __pam_pwd_required_facts }}"

- name: Record role begin fingerprint
  sr_fingerprint:
    sr_message: >-
      begin system_role:pam_pwd ansible_version={{ ansible_version.full }}
      {{ ansible_facts['distribution'] }}-{{ ansible_facts['distribution_version'] }}
